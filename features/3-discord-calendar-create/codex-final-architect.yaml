      Issue #3 の機能成果物から batch/loop/dashboard/judgment の生成状態を分離し、必要なら別コミットまたは生成物 ignore 方針に切り出してください。少なくとも本 PR から `features/.batch/*`、`features/.loop/*`、`.dashboard.md`、`codex-design*.yaml*` の状態更新を除外してください。
