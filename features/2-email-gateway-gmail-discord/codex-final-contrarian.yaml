  - severity: medium
    title: "T06 は実行ログに存在しない可能性が高い文字列を grep している"
    detail: |
      test-spec は `bin/run-claude.sh mail-watch 2>&1 | grep -E "disallowed-tools.*Calendar"` を要求していますが、この diff の run-claude.sh 変更には claude 起動引数を stderr に出す処理がありません。結果として disallowed-tools が正しく渡っていてもテストが失敗する、または検証不能になります。
    suggestion: |
      run-claude.sh が実際に引数列を出す仕様を追加するか、T06 を `lib/disallowed-tools.txt` と run-claude.sh の静的確認に変更してください。
