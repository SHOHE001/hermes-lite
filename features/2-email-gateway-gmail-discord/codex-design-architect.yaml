  - severity: medium
    title: "Gmail ラベル ID 取得失敗時の境界が prompt と docs のどちらの責務か曖昧"
    detail: |
      フローでは `list_labels` で `hermes-lite` と `hermes-lite/done` の ID を取得するとありますが、ラベル未作成時の通常経路は T08 のエラー試験に押し込まれています。セットアップ docs でラベル事前作成を受け入れ基準にしている一方、prompt の挙動として『存在しない場合は作成せず FAIL』なのか『明示エラー文を返す』のかが未定義です。
    suggestion: |
      prompt.md に、必要ラベルが見つからない場合はラベル作成を試みず非ゼロ/エラーとして終了する、などの明確な指示を入れてください。docs 側にも事前作成が必須であることを同じ用語で合わせてください。
