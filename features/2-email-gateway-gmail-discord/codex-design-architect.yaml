  - severity: medium
    title: "`.env` の `set -a` 変更が全ジョブに及ぶのに環境変数の衝突設計がない"
    detail: |
      `set -a; source .env` は `.env` 内のすべてのシェル変数を subprocess に流すため、`claude` 実行環境の暗黙入力が増えます。『export 付き .env の上位互換』という説明は構文互換の話に留まり、既存ジョブが export されていないローカル変数に依存していた場合の依存方向変更を評価していません。
    suggestion: |
      `.env` で許可するキーを列挙するか、`DISCORD_WEBHOOK_URL` など必要なキーのみ `export` する helper に寄せる設計を検討してください。少なくとも既存 `.env` の想定キーと全ジョブ影響を docs に明記してください。
